# Release pipeline: compila, testea y empaqueta en Linux, Windows y macOS.
# Se ejecuta solo al hacer push de un tag v* (ej.: git tag v0.1.0 && git push --tags).
# Convención: crear tags solo desde las ramas main, master o testing (dev es inestable).

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  check-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verificar rama permitida
        run: |
          BRANCHES=$(git branch -r --contains ${{ github.sha }} | grep -E 'origin/(main|master|testing)$' || true)
          if [ -z "$BRANCHES" ]; then
            echo "::error::El tag debe estar en main, master o testing. No hagas release desde dev."
            exit 1
          fi
          echo "Tag en rama permitida: $BRANCHES"

  build:
    needs: check-branch
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: bitemu-linux-x64
            lib_name: libbitemu.so
          - os: macos-latest
            artifact_name: bitemu-macos-x64
            lib_name: libbitemu.dylib
          - os: windows-latest
            artifact_name: bitemu-windows-x64
            lib_name: bitemu.dll

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Inject version from tag
        run: echo "${{ github.ref_name }}" | sed 's/^v//' > VERSION
        shell: bash

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libportaudio2 libfuse2 \
            libxcb-cursor0 libxcb-render-util0 libxcb-keysyms1

      - name: Install build tools (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          xcode-select -p || xcode-select --install
          brew install portaudio

      - name: Install MSYS2 / MinGW (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc make

      # --- Build ---

      - name: Build lib and CLI (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: make lib cli

      - name: Build lib and CLI (Windows)
        if: matrix.os == 'windows-latest'
        run: make lib cli
        shell: msys2 {0}

      - name: Rename library for Windows
        if: matrix.os == 'windows-latest'
        run: |
          if [ -f libbitemu.so ]; then mv libbitemu.so bitemu.dll; fi
          if [ -f libbitemu.dll ]; then mv libbitemu.dll bitemu.dll; fi
        shell: msys2 {0}

      # --- Test (core only; frontend tests need display) ---

      - name: Run core tests (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: make test-core

      - name: Run core tests (Windows)
        if: matrix.os == 'windows-latest'
        run: make test-core
        shell: msys2 {0}

      # --- Frontend venv ---

      - name: Create frontend venv (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cd frontend
          python -m venv venv
          ./venv/bin/pip install -r requirements.txt
          ./venv/bin/pip install pyinstaller Pillow
          touch venv/.done

      - name: Create frontend venv (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cd frontend
          python -m venv venv
          venv/Scripts/pip install -r requirements.txt
          venv/Scripts/pip install pyinstaller Pillow
          touch venv/.done

      # --- Package with PyInstaller (standalone, no Python needed by user) ---

      - name: PyInstaller bundle (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd frontend

          # xcb libs for Qt platform plugin (portaudio via linuxdeploy later)
          LIB_DIRS="/usr/lib/x86_64-linux-gnu /usr/lib /usr/lib64"
          XCB_FLAGS=""
          for lib in libxcb-cursor libxcb-render-util libxcb-keysyms; do
            for p in $LIB_DIRS; do
              F=$(find "$p" -name "${lib}.so*" 2>/dev/null | head -1)
              if [ -n "$F" ]; then XCB_FLAGS="$XCB_FLAGS --add-binary ${F}:."; break; fi
            done
          done

          ./venv/bin/pyinstaller --onedir --name bitemu \
            --icon "assets/icon.png" \
            --runtime-hook "hooks/rthook_portaudio.py" \
            --add-data "../VERSION:." \
            --add-binary "../libbitemu.so:." \
            --add-data "assets:assets" \
            $XCB_FLAGS \
            --collect-all sounddevice \
            --collect-all pygame \
            --collect-all PySide6 \
            --collect-submodules bitemu_gui \
            main.py
          cp ../VERSION dist/bitemu/

      - name: PyInstaller bundle (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd frontend

          PA_FLAG=""
          for p in /opt/homebrew/lib /usr/local/lib; do
            PA=$(find "$p" -name 'libportaudio*.dylib' 2>/dev/null | head -1)
            if [ -n "$PA" ]; then PA_FLAG="--add-binary ${PA}:."; break; fi
          done

          ./venv/bin/pyinstaller --onedir --name bitemu \
            --icon "assets/icon.png" \
            --runtime-hook "hooks/rthook_portaudio.py" \
            --add-data "../VERSION:." \
            --add-binary "../libbitemu.dylib:." \
            --add-data "assets:assets" \
            $PA_FLAG \
            --collect-all sounddevice \
            --collect-all pygame \
            --hidden-import bitemu_gui \
            --hidden-import bitemu_gui.core \
            --hidden-import bitemu_gui.game_widget \
            --hidden-import bitemu_gui.main_window \
            --hidden-import bitemu_gui.keys \
            --hidden-import bitemu_gui.profile \
            --hidden-import bitemu_gui.splash_widget \
            --hidden-import bitemu_gui.library_widget \
            --hidden-import bitemu_gui.rom_scanner \
            --hidden-import bitemu_gui.scraper \
            --hidden-import bitemu_gui.input_config \
            --hidden-import bitemu_gui.input_dialog \
            --hidden-import bitemu_gui.gamepad \
            --hidden-import bitemu_gui.update_checker \
            main.py
          cp ../VERSION dist/bitemu/

      - name: PyInstaller bundle (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cd frontend
          venv/Scripts/pyinstaller --onedir --name bitemu \
            --icon "assets/icon.png" \
            --runtime-hook "hooks/rthook_portaudio.py" \
            --add-data "../VERSION;." \
            --add-binary "../bitemu.dll;." \
            --add-data "assets;assets" \
            --collect-all sounddevice \
            --collect-all pygame \
            --hidden-import bitemu_gui \
            --hidden-import bitemu_gui.core \
            --hidden-import bitemu_gui.game_widget \
            --hidden-import bitemu_gui.main_window \
            --hidden-import bitemu_gui.keys \
            --hidden-import bitemu_gui.profile \
            --hidden-import bitemu_gui.splash_widget \
            --hidden-import bitemu_gui.library_widget \
            --hidden-import bitemu_gui.rom_scanner \
            --hidden-import bitemu_gui.scraper \
            --hidden-import bitemu_gui.input_config \
            --hidden-import bitemu_gui.input_dialog \
            --hidden-import bitemu_gui.gamepad \
            --hidden-import bitemu_gui.update_checker \
            main.py
          cp ../VERSION dist/bitemu/

      # --- Native packaging ---

      - name: Package AppImage (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -e
          VERSION_STR=$(cat VERSION)

          mkdir -p AppDir/usr/bin \
                   AppDir/usr/share/applications \
                   AppDir/usr/share/icons/hicolor/256x256/apps

          cp -r frontend/dist/bitemu/* AppDir/usr/bin/

          # .desktop file (no leading whitespace)
          cat > AppDir/bitemu.desktop <<EOF
          [Desktop Entry]
          Name=Bitemu
          Exec=bitemu
          Icon=bitemu
          Type=Application
          Categories=Game;Emulator;
          Comment=Game Boy Emulator v${VERSION_STR}
          EOF
          sed -i 's/^          //' AppDir/bitemu.desktop
          cp AppDir/bitemu.desktop AppDir/usr/share/applications/

          # Icon from project assets
          if [ -f frontend/assets/icon.png ]; then
            cp frontend/assets/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/bitemu.png
            cp frontend/assets/icon.png AppDir/bitemu.png
          fi

          # linuxdeploy: bundle libportaudio + deps (libasound, etc.) into AppDir
          PA_PATH=""
          for p in /usr/lib/x86_64-linux-gnu /usr/lib /usr/lib64; do
            PA_PATH=$(find "$p" -name 'libportaudio.so*' 2>/dev/null | head -1)
            [ -n "$PA_PATH" ] && break
          done
          if [ -z "$PA_PATH" ]; then
            echo "::error::libportaudio not found. Install libportaudio2 on runner."
            exit 1
          fi
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage -O linuxdeploy
          chmod +x linuxdeploy
          ./linuxdeploy --appdir AppDir \
            --executable AppDir/usr/bin/bitemu \
            --library "$PA_PATH" \
            --desktop-file AppDir/bitemu.desktop

          if ! find AppDir -name 'libportaudio.so*' -print -quit | grep -q .; then
            echo "::error::linuxdeploy did not bundle libportaudio"
            exit 1
          fi

          # Remove linuxdeploy's AppRun from usr/bin (causes usr/bin/usr/bin path duplication)
          rm -f AppDir/usr/bin/AppRun

          # AppRun at root (rm -f usr/bin/AppRun above prevents path duplication)
          cat > AppDir/AppRun <<'APPRUN'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          BIN="${HERE}/usr/bin"
          LIB="${HERE}/usr/lib"
          export LD_LIBRARY_PATH="${LIB}:${BIN}:${BIN}/_internal:${LD_LIBRARY_PATH}"
          for p in "${LIB}/libportaudio.so"* "${BIN}/_internal/libportaudio.so"* "${BIN}/libportaudio.so"*; do
            [ -e "$p" ] && export LD_PRELOAD="${p}${LD_PRELOAD:+:$LD_PRELOAD}" && break
          done
          for d in "${BIN}/_internal/PySide6/Qt/plugins/platforms" \
                   "${BIN}/PySide6/Qt/plugins/platforms" \
                   "${BIN}/platforms"; do
            [ -d "$d" ] && export QT_QPA_PLATFORM_PLUGIN_PATH="$d" && break
          done
          exec "${BIN}/bitemu" "$@"
          APPRUN
          sed -i 's/^          //' AppDir/AppRun
          chmod +x AppDir/AppRun

          # tar.gz: copy linuxdeploy-bundled libportaudio into dist for FUSE-free package
          if [ -d AppDir/usr/lib ]; then
            cp -P AppDir/usr/lib/libportaudio.so* frontend/dist/bitemu/_internal/ 2>/dev/null || true
          fi

          # Build AppImage (APPIMAGE_EXTRACT_AND_RUN bypasses FUSE requirement on runner)
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool AppDir ${{ matrix.artifact_name }}-${VERSION_STR}.AppImage || true

          # Verify AppImage structure (prevent usr/bin/usr/bin path duplication)
          if [ -f ${{ matrix.artifact_name }}-${VERSION_STR}.AppImage ]; then
            chmod +x ${{ matrix.artifact_name }}-${VERSION_STR}.AppImage
            ${{ matrix.artifact_name }}-${VERSION_STR}.AppImage --appimage-extract 2>/dev/null || true
            if [ -d squashfs-root ]; then
              [ -f squashfs-root/AppRun ] || (echo "::error::AppRun missing at root" && exit 1)
              [ -f squashfs-root/usr/bin/bitemu ] || (echo "::error::usr/bin/bitemu missing" && exit 1)
              [ ! -f squashfs-root/usr/bin/AppRun ] || (echo "::error::AppRun in usr/bin causes path duplication" && exit 1)
              rm -rf squashfs-root
            fi
          fi

          # Always produce a tar.gz as FUSE-free alternative
          cp AppDir/bitemu.desktop frontend/dist/bitemu/
          [ -f AppDir/bitemu.png ] && cp AppDir/bitemu.png frontend/dist/bitemu/
          cat > frontend/dist/bitemu/bitemu.sh <<'LAUNCHER'
          #!/bin/sh
          HERE="$(cd "$(dirname "$0")" && pwd)"
          export LD_LIBRARY_PATH="${HERE}:${HERE}/_internal:${LD_LIBRARY_PATH}"
          for p in "${HERE}/_internal/libportaudio.so"* "${HERE}/libportaudio.so"*; do
            [ -e "$p" ] && export LD_PRELOAD="${p}${LD_PRELOAD:+:$LD_PRELOAD}" && break
          done
          for d in "${HERE}/_internal/PySide6/Qt/plugins/platforms" \
                   "${HERE}/PySide6/Qt/plugins/platforms" \
                   "${HERE}/platforms"; do
            if [ -d "$d" ]; then
              export QT_QPA_PLATFORM_PLUGIN_PATH="$d"
              break
            fi
          done
          exec "${HERE}/bitemu" "$@"
          LAUNCHER
          sed -i 's/^          //' frontend/dist/bitemu/bitemu.sh
          chmod +x frontend/dist/bitemu/bitemu.sh frontend/dist/bitemu/bitemu
          tar czf ${{ matrix.artifact_name }}-${VERSION_STR}.tar.gz -C frontend/dist bitemu

      - name: Package DMG (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          VERSION_STR=$(cat VERSION)
          mkdir -p dmg_contents
          cp -r frontend/dist/bitemu dmg_contents/Bitemu
          # Create DMG
          hdiutil create -volname "Bitemu ${VERSION_STR}" \
            -srcfolder dmg_contents \
            -ov -format UDZO \
            ${{ matrix.artifact_name }}-${VERSION_STR}.dmg || true
          # Fallback: zip if DMG fails
          if [ ! -f ${{ matrix.artifact_name }}-${VERSION_STR}.dmg ]; then
            cd frontend/dist && zip -r ../../${{ matrix.artifact_name }}-${VERSION_STR}.zip bitemu
          fi

      - name: Package ZIP (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $version = (Get-Content VERSION).Trim()
          Compress-Archive -Path frontend/dist/bitemu/* -DestinationPath "${{ matrix.artifact_name }}-${version}.zip"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}-*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect pre-release
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if echo "$TAG" | grep -qE '-(beta|alpha|rc|dev)'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: bitemu-*

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Bitemu ${{ github.ref_name }}
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.tar.gz
            artifacts/**/*.dmg
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
