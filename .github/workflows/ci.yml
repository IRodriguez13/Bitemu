# CI: compila y testea en cada push/PR para prevenir regresiones (sin empaquetado ni deploy).
# Misma lógica en todas las ramas listadas; deploy y artefactos van solo en release.yml (tags v*).
# dev: push (y PR hacia dev) actúan como primera barrera de calidad antes de integrar a main/master.

name: CI

on:
  push:
    branches: [main, master, testing, dev]
  pull_request:
    branches: [main, master, testing, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      PROFILE: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libasound2-dev libegl1 libxcb-cursor0

      - name: Build lib and CLI
        run: make lib cli

      - name: Run core tests
        run: make test-core

      - name: Create frontend venv
        run: |
          cd frontend
          python -m venv venv
          ./venv/bin/pip install -r requirements.txt
          touch venv/.done

      - name: Run frontend tests
        run: QT_QPA_PLATFORM=offscreen make test-frontend
