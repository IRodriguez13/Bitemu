# CI: compila y testea en cada push/PR para prevenir regresiones.
# El release (release.yml) se ejecuta solo al hacer push de un tag v*.

name: CI

on:
  push:
    branches: [main, master, testing]
  pull_request:
    branches: [main, master, testing]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libasound2-dev

      - name: Build lib and CLI
        run: make lib cli

      - name: Run core tests
        run: make test-core

      - name: Create frontend venv
        run: |
          cd frontend
          python -m venv venv
          ./venv/bin/pip install -r requirements.txt
          touch venv/.done

      - name: Run frontend tests
        run: make test-frontend
